# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    default_log_retention: 30
    default_auto_cleanup: true
    locale: 'en'
    kernel.default_locale: 'en'
    kernel.enabled_locales: ['en', 'uk']
    app.supported_locales: 'en|uk'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $defaultLocale: '%locale%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Register the locale listener
    App\EventListener\LocaleListener:
        arguments:
            - '%locale%'
        tags:
            - { name: kernel.event_subscriber }

    # Parser, Generator, and Converter services are already configured in their bundles
    # but we can add aliases for easier access
    app.parser_service:
        alias: App\Core\Parser\ClassDiagram\Application\Service\UmlParserService
        public: true

    app.generator_service:
        alias: App\Core\Generator\ClassDiagram\Application\Service\CodeGeneratorService
        public: true

    app.converter_service:
        alias: App\Core\Converter\ClassDiagram\Application\Service\UmlCodeConverterService
        public: true

    # Custom Monolog Database Handler
    App\Service\DatabaseLogHandler:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $requestStack: '@request_stack'
            $security: '@security.helper'

    # Admin Panel Twig Extension
    App\Twig\AdminExtension:
        tags:
            - { name: twig.extension }
