# OAuth routes without locale (imported from separate file)
security_routes:
    resource: 'routes/security.yaml'

# History API routes without locale
history_api_routes:
    resource: '../src/Controller/HistoryController.php'
    type: attribute

# Controllers with locale (excluding Admin)
controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: en|uk
    defaults:
        _locale: en
    exclude: ['../src/Controller/Admin/']

# Core API routes without locale
api_parser_routes:
    resource: '../src/Core/Parser/ClassDiagram/Presentation/Controller/ApiController.php'
    type: attribute

api_generator_routes:
    resource: '../src/Core/Generator/ClassDiagram/Presentation/Controller/ApiController.php'
    type: attribute

api_converter_routes:
    resource: '../src/Core/Converter/ClassDiagram/Presentation/Controller/ApiController.php'
    type: attribute

web_parser_routes:
    resource: '../src/Core/Parser/ClassDiagram/Presentation/Controller/WebController.php'
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: en|uk
    defaults:
        _locale: en

web_generator_routes:
    resource: '../src/Core/Generator/ClassDiagram/Presentation/Controller/WebController.php'
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: en|uk
    defaults:
        _locale: en

web_converter_routes:
    resource: '../src/Core/Converter/ClassDiagram/Presentation/Controller/WebController.php'
    type: attribute
    prefix: /{_locale}
    requirements:
        _locale: en|uk
    defaults:
        _locale: en


# Admin redirects to dashboard
admin_redirect:
    path: /admin
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::urlRedirectAction
    defaults:
        path: /en/admin-panel
        permanent: false

admin_redirect_en:
    path: /en/admin
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::urlRedirectAction
    defaults:
        path: /en/admin-panel
        permanent: false

admin_redirect_uk:
    path: /uk/admin
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::urlRedirectAction
    defaults:
        path: /uk/admin-panel
        permanent: false

# Admin dashboard redirects (for URLs like /en/admin/dashboard)
admin_dashboard_redirect_en:
    path: /en/admin/dashboard
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::urlRedirectAction
    defaults:
        path: /en/admin-panel
        permanent: false

admin_dashboard_redirect_uk:
    path: /uk/admin/dashboard
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::urlRedirectAction
    defaults:
        path: /uk/admin-panel
        permanent: false

# Root redirect
index:
    path: /
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::urlRedirectAction
    defaults:
        path: /en
        permanent: false
