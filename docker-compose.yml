version: '3.8'

services:
  # PHP Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: uml2code_php
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - postgres
    networks:
      - uml2code_network
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql://uml2code_user:uml2code_password@postgres:5432/uml2code_db

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: uml2code_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - uml2code_network

  # PostgreSQL Service
  postgres:
    image: postgres:16-alpine
    container_name: uml2code_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=uml2code_user
      - POSTGRES_PASSWORD=uml2code_password
      - POSTGRES_DB=uml2code_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uml2code_network

  # Mailhog Service
  mailhog:
    image: mailhog/mailhog
    container_name: uml2code_mailhog
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
        - uml2code_network

networks:
  uml2code_network:
    driver: bridge

volumes:
  postgres_data:
